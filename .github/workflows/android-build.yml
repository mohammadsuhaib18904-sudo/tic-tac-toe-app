name: Android Cloud APK Builder

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tic-tac-toe-app-copilot-fix-failing-github-actions-job

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download App Dependencies
        run: flutter pub get

      - name: Compile Release APK Package
        run: flutter build apk --release

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: tic-tac-toe-app-copilot-fix-failing-github-actions-job/build/app/outputs/flutter-apk/app-release.apk